<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio Web Catalina</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <header>
        <h1>Mi Sitio Web</h1>
        <nav>
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Sobre mí</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Sobre mi formación</h2>

            <article>
                <h3>Aprendiz SENA ADSO</h3>

                <figure>
                    <img src="img/sena.png" alt="Logo del SENA representando formación tecnológica">
                    <figcaption>Formación en Análisis y Desarrollo de Software</figcaption>
                </figure>

                <p>
                    Mi meta es graduarme en el programa ADSO del SENA y ejercer como desarrolladora de software.
                </p>
            </article>
        </section>

        <aside>
            <h3>Información adicional</h3>
            <p>Ficha: 3267541</p>
            <p>Ciudad: Rionegro</p>
        </aside>

        <section>
            <h2>Contacto</h2>

            <form>
                <div>
                    <label>Nombre:</label>
                    <input type="text" name="nombre" required minlength="4">
                </div>

                <div>
                    <label>Correo electrónico:</label>
                    <input type="email" name="email" required>
                </div>

                <div>
                    <label>Mensaje:</label>
                    <textarea name="mensaje" required minlength="10"></textarea>
                </div>

                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Catalina Alvis Méndez</p>
    </footer>

</body>
</html>
